name: AIUsage
options:
  bundleIdPrefix: dev.aitor
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  localPackagesGroup: ""

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.4"
    CURRENT_PROJECT_VERSION: "11"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

packages:
  AIUsageCore:
    path: AIUsageCore

targets:
  AIUsage:
    type: application
    platform: macOS
    sources:
      - path: macOS
        type: syncedFolder
      - path: Resources
        type: syncedFolder
    settings:
      base:
        PRODUCT_NAME: "AI Usage"
        PRODUCT_BUNDLE_IDENTIFIER: dev.aitor.ai-usage
        CODE_SIGN_ENTITLEMENTS: Signing/App.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
    info:
      path: Signing/AppInfo.plist
      properties:
        CFBundleName: AI Usage
        CFBundleDisplayName: AI Usage
        CFBundleShortVersionString: "1.4"
        CFBundleVersion: "11"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        CFBundleURLTypes:
          - CFBundleURLName: dev.aitor.ai-usage
            CFBundleURLSchemes:
              - aiusage
    dependencies:
      - target: AIUsageWidget
        embed: true
      - package: AIUsageCore

  AIUsageWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: macOSWidget
        type: syncedFolder
    dependencies:
      - package: AIUsageCore
    settings:
      base:
        PRODUCT_NAME: AIUsageWidget
        PRODUCT_BUNDLE_IDENTIFIER: dev.aitor.ai-usage.AIUsageWidget
        CODE_SIGN_ENTITLEMENTS: Signing/Widget.entitlements
    info:
      path: Signing/WidgetInfo.plist
      properties:
        CFBundleDisplayName: AI Usage
        CFBundleShortVersionString: "1.4"
        CFBundleVersion: "11"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  AIUsageiOS:
    type: application
    platform: iOS
    sources:
      - path: iOS
        type: syncedFolder
    settings:
      base:
        PRODUCT_NAME: "AI Usage"
        PRODUCT_BUNDLE_IDENTIFIER: dev.aitor.ai-usage
        CODE_SIGN_ENTITLEMENTS: Signing/iOSApp.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SK4CMEFH7T
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGNING_REQUIRED: "YES"
    info:
      path: Signing/iOSAppInfo.plist
      properties:
        CFBundleName: AI Usage
        CFBundleDisplayName: AI Usage
        CFBundleShortVersionString: "1.4"
        CFBundleVersion: "11"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: AIUsageWidgetiOS
        embed: true
      - target: AIUsageWatch
        embed: true
      - package: AIUsageCore

  AIUsageWatch:
    type: application
    platform: watchOS
    sources:
      - path: watchOS
        type: syncedFolder
    dependencies:
      - target: AIUsageWatchWidget
        embed: true
      - package: AIUsageCore
    settings:
      base:
        PRODUCT_NAME: "AI Usage"
        PRODUCT_BUNDLE_IDENTIFIER: dev.aitor.ai-usage.watchkitapp
        CODE_SIGN_ENTITLEMENTS: Signing/WatchApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SK4CMEFH7T
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGNING_REQUIRED: "YES"
    info:
      path: Signing/WatchAppInfo.plist
      properties:
        CFBundleName: AI Usage
        CFBundleDisplayName: AI Usage
        CFBundleShortVersionString: "1.4"
        CFBundleVersion: "11"
        WKApplication: true
        WKCompanionAppBundleIdentifier: dev.aitor.ai-usage

  AIUsageWatchWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: watchOSWidget
        type: syncedFolder
    dependencies:
      - package: AIUsageCore
    settings:
      base:
        PRODUCT_NAME: AIUsageWatchWidget
        PRODUCT_BUNDLE_IDENTIFIER: dev.aitor.ai-usage.watchkitapp.widget
        CODE_SIGN_ENTITLEMENTS: Signing/WatchWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SK4CMEFH7T
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGNING_REQUIRED: "YES"
    info:
      path: Signing/WatchWidgetInfo.plist
      properties:
        CFBundleDisplayName: AI Usage
        CFBundleShortVersionString: "1.4"
        CFBundleVersion: "11"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  AIUsageMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: macOSTests
        type: syncedFolder
    dependencies:
      - target: AIUsage
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AI Usage.app/Contents/MacOS/AI Usage"
        BUNDLE_LOADER: "$(TEST_HOST)"

  AIUsageiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iOSTests
        type: syncedFolder
    dependencies:
      - target: AIUsageiOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AI Usage.app/AI Usage"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SK4CMEFH7T
        CODE_SIGNING_ALLOWED: "YES"

  AIUsageWidgetiOS:
    type: app-extension
    platform: iOS
    sources:
      - path: iOSWidget
        type: syncedFolder
    dependencies:
      - package: AIUsageCore
    settings:
      base:
        PRODUCT_NAME: AIUsageiOSWidget
        PRODUCT_BUNDLE_IDENTIFIER: dev.aitor.ai-usage.iOSWidget
        CODE_SIGN_ENTITLEMENTS: Signing/iOSWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SK4CMEFH7T
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGNING_REQUIRED: "YES"
    info:
      path: Signing/iOSWidgetInfo.plist
      properties:
        CFBundleDisplayName: AI Usage
        CFBundleShortVersionString: "1.4"
        CFBundleVersion: "11"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  AIUsage:
    build:
      targets:
        AIUsage: all
    run:
      config: Release
    test:
      config: Debug
      targets:
        - AIUsageMacTests
  AIUsageiOS:
    build:
      targets:
        AIUsageiOS: all
    run:
      config: Release
    test:
      config: Debug
      targets:
        - AIUsageiOSTests
  AIUsageWatch:
    build:
      targets:
        AIUsageWatch: all
    run:
      config: Release
